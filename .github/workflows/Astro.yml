name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'Project.toml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install Julia doc dependencies
        run: julia --project=docs/script -e 'using Pkg; Pkg.instantiate()'
      - name: Generate API docs
        run: julia --project=docs/script docs/script/gendoc.jl
      - name: Build site
        uses: withastro/action@v6
        with:
          path: docs/
        env:
          BASE_PATH: Moshi.jl
          SITE_URL: https://rogerluo.dev

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
